name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'
      
      - name: Install Tools
        run: |
          pip install python-for-android openssl
          sudo apt-get install -y zip unzip openjdk-17-jdk ant autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Build APK with P4A
        run: |
          p4a apk --private . \
            --package=ru.alex.subtracker \
            --name="SubTracker Ultra" \
            --version=0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,kivymd,plyer,sqlite3 \
            --arch=arm64-v8a \
            --permission VIBRATE \
            --permission RECEIVE_BOOT_COMPLETED

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SubTracker-Release
          path: "*.apk"
