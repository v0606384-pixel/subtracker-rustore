name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install python-for-android
          sudo apt-get install -y zip unzip openjdk-17-jdk ant autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Build APK
        run: p4a apk --private . --package=ru.alex.subtracker --name="SubTracker" --version=0.1 --bootstrap=sdl2 --requirements=python3,kivy,kivymd,plyer,sqlite3 --arch=arm64-v8a --permission VIBRATE

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SubTracker-Release
          path: "*.apk"
